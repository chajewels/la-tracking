name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/reconcile-account/**'
      - 'supabase/functions/daily-reconciliation/**'
      - 'supabase/config.toml'
  workflow_dispatch:
    inputs:
      function:
        description: 'Function to deploy (reconcile-account, daily-reconciliation, or all)'
        required: false
        default: 'all'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy reconcile-account
        if: ${{ github.event_name == 'push' || github.event.inputs.function == 'reconcile-account' || github.event.inputs.function == 'all' }}
        run: |
          supabase functions deploy reconcile-account \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy daily-reconciliation
        if: ${{ github.event_name == 'push' || github.event.inputs.function == 'daily-reconciliation' || github.event.inputs.function == 'all' }}
        run: |
          supabase functions deploy daily-reconciliation \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
