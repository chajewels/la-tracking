name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/reconcile-account/**'
      - 'supabase/functions/daily-reconciliation/**'
      - 'supabase/functions/record-payment/**'
      - 'supabase/functions/record-multi-payment/**'
      - 'supabase/functions/bulk-import/**'
      - 'supabase/functions/carry-over/**'
      - 'supabase/functions/accept-underpayment/**'
      - 'supabase/functions/review-payment-submission/**'
      - 'supabase/functions/edit-schedule-item/**'
      - 'supabase/config.toml'
  workflow_dispatch:
    inputs:
      function:
        description: 'Function to deploy (carry-over, accept-underpayment, review-payment-submission, edit-schedule-item, reconcile-account, daily-reconciliation, record-payment, record-multi-payment, bulk-import, or "all")'
        required: false
        default: 'all'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy reconcile-account
        if: ${{ github.event_name == 'push' || contains(fromJson('["reconcile-account","all"]'), github.event.inputs.function) }}
        run: supabase functions deploy reconcile-account --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy daily-reconciliation
        if: ${{ github.event_name == 'push' || contains(fromJson('["daily-reconciliation","all"]'), github.event.inputs.function) }}
        run: supabase functions deploy daily-reconciliation --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy record-payment
        if: ${{ github.event_name == 'push' || contains(fromJson('["record-payment","all"]'), github.event.inputs.function) }}
        run: supabase functions deploy record-payment --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy record-multi-payment
        if: ${{ github.event_name == 'push' || contains(fromJson('["record-multi-payment","all"]'), github.event.inputs.function) }}
        run: supabase functions deploy record-multi-payment --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy bulk-import
        if: ${{ github.event_name == 'push' || contains(fromJson('["bulk-import","all"]'), github.event.inputs.function) }}
        run: supabase functions deploy bulk-import --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy carry-over
        if: ${{ github.event_name == 'push' || contains(fromJson('["carry-over","all"]'), github.event.inputs.function) }}
        run: supabase functions deploy carry-over --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy accept-underpayment
        if: ${{ github.event_name == 'push' || contains(fromJson('["accept-underpayment","all"]'), github.event.inputs.function) }}
        run: supabase functions deploy accept-underpayment --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy review-payment-submission
        if: ${{ github.event_name == 'push' || contains(fromJson('["review-payment-submission","all"]'), github.event.inputs.function) }}
        run: supabase functions deploy review-payment-submission --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy edit-schedule-item
        if: ${{ github.event_name == 'push' || contains(fromJson('["edit-schedule-item","all"]'), github.event.inputs.function) }}
        run: supabase functions deploy edit-schedule-item --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
